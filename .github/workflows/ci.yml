name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Use runner Chromium
        run: |
          browser="$(command -v chromium || command -v google-chrome)"
          test -n "$browser"
          echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE=$browser" >> "$GITHUB_ENV"
      - run: pnpm test:e2e
